<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · GadgetForge</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #111827;
        color: #e5e7eb;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
      }
      .mark {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        margin: 0 auto 20px;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .mark svg {
        width: 40px;
        height: 40px;
        fill: #fff;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 20px;
        color: #9ca3af;
        line-height: 1.5;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 18px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #fff;
        background: #2563eb;
        cursor: pointer;
      }
      @media (prefers-color-scheme: light) {
        body {
          background: #ffffff;
          color: #111827;
        }
        p {
          color: #4b5563;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark">
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <path
            d="M11.251.068a.5.5 0 0 1 .227.58L9.677 6.5H13a.5.5 0 0 1 .364.843l-8 8.5a.5.5 0 0 1-.842-.49L6.323 9.5H3a.5.5 0 0 1-.364-.843l8-8.5a.5.5 0 0 1 .615-.09z"
          />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>
        This page hasn't been cached yet. Tools you've already opened still work
        offline — reconnect to load new ones.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
