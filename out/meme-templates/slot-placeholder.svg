<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Gray background -->
  <rect width="200" height="200" fill="#d4d4d4" rx="4"/>
  <!-- Dashed border hint -->
  <rect x="6" y="6" width="188" height="188" fill="none" stroke="#a0a0a0"
        stroke-width="2" stroke-dasharray="8 4" rx="3"/>
  <!-- Camera body -->
  <rect x="55" y="82" width="90" height="60" rx="8" fill="#9a9a9a"/>
  <!-- Lens ring outer -->
  <circle cx="100" cy="112" r="22" fill="#b8b8b8" stroke="#888" stroke-width="2"/>
  <!-- Lens ring inner -->
  <circle cx="100" cy="112" r="13" fill="#909090"/>
  <!-- Lens highlight -->
  <circle cx="94" cy="106" r="4" fill="rgba(255,255,255,0.3)"/>
  <!-- Viewfinder bump -->
  <rect x="70" y="73" width="26" height="13" rx="4" fill="#9a9a9a"/>
  <!-- Flash -->
  <rect x="140" y="85" width="10" height="8" rx="2" fill="#b8b8b8"/>
</svg>
