<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#f2e8d0"/>
  <!-- Outer border -->
  <rect x="12" y="12" width="576" height="776" fill="none" stroke="#8b6914" stroke-width="6"/>
  <rect x="20" y="20" width="560" height="760" fill="none" stroke="#8b6914" stroke-width="2"/>
  <!-- WANTED header -->
  <text x="300" y="80" font-family="Georgia,serif" font-size="54" font-weight="bold"
        fill="#1a1a1a" text-anchor="middle" letter-spacing="8">WANTED</text>
  <!-- Dead or Alive subtext -->
  <text x="300" y="118" font-family="Georgia,serif" font-size="18" fill="#4a3000"
        text-anchor="middle" letter-spacing="3">DEAD OR ALIVE</text>
  <line x1="50" y1="128" x2="550" y2="128" stroke="#8b6914" stroke-width="2"/>
  <!-- Photo area placeholder border -->
  <rect x="70" y="145" width="460" height="350" fill="#ddd4b8" stroke="#8b6914" stroke-width="2"/>
  <!-- REWARD text -->
  <text x="300" y="640" font-family="Georgia,serif" font-size="22" fill="#4a3000"
        text-anchor="middle" letter-spacing="4">REWARD</text>
  <line x1="50" y1="648" x2="550" y2="648" stroke="#8b6914" stroke-width="1"/>
</svg>
