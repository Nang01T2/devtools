<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f5f0e8"/>
  <!-- Masthead banner -->
  <rect x="0" y="0" width="800" height="70" fill="#1a1a1a"/>
  <text x="400" y="46" font-family="Georgia,serif" font-size="32" font-weight="bold"
        fill="#f5f0e8" text-anchor="middle" letter-spacing="6">THE DAILY MEME</text>
  <!-- Left photo column border -->
  <rect x="10" y="80" width="280" height="440" fill="#e0d8cc" stroke="#999" stroke-width="1"/>
  <!-- Vertical divider -->
  <line x1="310" y1="80" x2="310" y2="540" stroke="#999" stroke-width="1"/>
  <!-- Horizontal rule under masthead -->
  <line x1="0" y1="72" x2="800" y2="72" stroke="#999" stroke-width="1"/>
  <!-- Footer rule -->
  <line x1="0" y1="548" x2="800" y2="548" stroke="#999" stroke-width="1"/>
  <text x="400" y="572" font-family="Georgia,serif" font-size="11" fill="#888"
        text-anchor="middle">© THE DAILY MEME — Est. 2026</text>
</svg>
