<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#1a1a1a"/>
  <!-- Left panel -->
  <rect x="5" y="50" width="390" height="445" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <!-- Right panel -->
  <rect x="405" y="50" width="390" height="445" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <!-- THEN label -->
  <rect x="5" y="5" width="390" height="42" fill="#333"/>
  <text x="200" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="700"
        fill="#f0f0f0" text-anchor="middle" letter-spacing="4">THEN</text>
  <!-- NOW label -->
  <rect x="405" y="5" width="390" height="42" fill="#4a90e2"/>
  <text x="600" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="700"
        fill="#fff" text-anchor="middle" letter-spacing="4">NOW</text>
  <!-- Divider -->
  <line x1="400" y1="0" x2="400" y2="500" stroke="#555" stroke-width="2"/>
</svg>
